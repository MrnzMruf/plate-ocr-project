<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Demo (Plate Simulation)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        input[type="file"], button { padding: 12px; margin: 15px; font-size: 18px; }
        button { background: #2196F3; color: white; border: none; cursor: pointer; width: 200px; }
        button:hover { background: #0b7dda; }
        #preview { max-width: 400px; margin: 20px auto; border: 2px solid #ddd; border-radius: 8px; }
        #result { margin-top: 30px; font-size: 18px; white-space: pre-wrap; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Image Upload Test (Plate Simulation)</h2>
        <p>Select an image and click the button to send it to the mock endpoint (demo only).</p>
        
        <input type="file" id="imageInput" accept="image/*">
        <br>
        <img id="preview" src="" alt="Image Preview">
        <br>
        <button onclick="uploadImage()">Upload & Process</button>
        
        <div id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) {
                alert('Please select an image first!');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);  // Standard field name for file upload

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Uploading and processing...';

            try {
                // === CONFIDENTIALITY NOTE ===
                // In the real project this URL would point to the actual company plate recognition API,
                // for example: http://internal-server:5050/plaque or similar.
                // Due to confidentiality and NDA, no real endpoint is included here.
                // This is a placeholder for demonstration purposes only.
                const response = await fetch('http://localhost:8000/company-plate-api/', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const data = await response.json();
                resultDiv.innerHTML = `<h3>Result:</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = 'Upload error: ' + error.message;
            }
        }
    </script>
</body>
</html>
